name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platforms;android-35 build-tools;35.0.0'

      - name: Verify SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools"

      - name: Install npm deps
        run: npm install

      - name: Copy web assets
        run: |
          mkdir -p www
          cp index.html manifest.json sw.js www/
          cp -r css js icons www/

      - name: Add Android platform
        run: npx cap add android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: life-manager-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
